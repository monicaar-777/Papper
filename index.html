<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>Meu Cantinho — Planner 2026</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#F7C6DB" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Meu Cantinho" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" sizes="32x32" href="icon-32.png" />

<!-- fontes fofas -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />

<!-- Tailwind (via CDN, compila as classes direto no navegador) -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- React + ReactDOM -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<!-- Babel, para o navegador entender o JSX do app.jsx -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  html, body { margin: 0; padding: 0; background: #FFF8F3; overscroll-behavior-y: none; }
  * { -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>

<div id="root">
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:sans-serif;color:#C9A9BE;">
    Carregando seu cantinho... ✨
  </div>
</div>

<script>
  // pequena "ponte" para o app funcionar exatamente como no Claude,
  // salvando os dados no localStorage do navegador
  window.storage = {
    get: function (chave) {
      return new Promise(function (resolve) {
        try {
          var valor = localStorage.getItem("planner_" + chave);
          if (valor === null) return resolve(null);
          resolve({ key: chave, value: valor, shared: false });
        } catch (e) {
          resolve(null);
        }
      });
    },
    set: function (chave, valor) {
      return new Promise(function (resolve) {
        try {
          localStorage.setItem("planner_" + chave, valor);
          resolve({ key: chave, value: valor, shared: false });
        } catch (e) {
          resolve(null);
        }
      });
    },
  };

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("service-worker.js").catch(function () {});
    });
  }
</script>

<script type="text/babel" data-presets="react" src="app.jsx"></script>

</body>
</html>
