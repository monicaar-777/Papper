<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner 2026</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FFB6C1">
    
    <!-- Tailwind CSS para os estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React e Babel para traduzir o app.jsx diretamente no navegador -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Ícone Lucide para os símbolos lindinhos do Planner -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-800">

    <div id="root">
        <!-- Tela de carregamento fofa enquanto o React inicia -->
        <div class="flex flex-col items-center justify-center min-h-screen bg-[#FFF5F5]">
            <p class="text-xl font-medium text-pink-400 animate-pulse">Carregando seu cantinho... ✨</p>
        </div>
    </div>

    <!-- Carrega o script React principal usando o Babel como tradutor -->
    <script type="text/babel" src="app.jsx"></script>

    <!-- Registra o Service Worker para funcionar offline -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(reg => console.log('Service Worker registrado com sucesso!', reg))
                    .catch(err => console.log('Falha ao registrar o Service Worker:', err));
            });
        }
    </script>
</body>
</html>
